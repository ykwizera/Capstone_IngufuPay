services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ingufupay_db}
      POSTGRES_USER: ${POSTGRES_USER:-ingufupay_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ingufupay_user} -d ${POSTGRES_DB:-ingufupay_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ingufupay_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ingufupay_db}
      DJANGO_SETTINGS_MODULE: ingufupay.settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: